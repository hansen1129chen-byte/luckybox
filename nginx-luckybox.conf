server {
    listen 80;
    listen 443 ssl;
    server_name luckyelysian.vip www.luckyelysian.vip;
    client_max_body_size 10m;

    ssl_certificate /etc/letsencrypt/live/luckyelysian.vip/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/luckyelysian.vip/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location = / { return 301 /lucky_box/; }

    location /lucky_box/api/ {
        proxy_pass http://127.0.0.1:3003/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /lucky_box/uploads/ {
        proxy_pass http://127.0.0.1:3003/uploads/;
        proxy_set_header Host $host;
    }

    location /lucky_box/ {
        alias /opt/luckybox-v2/client/dist/;
        try_files $uri /lucky_box/index.html;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:3003;
        proxy_set_header Host $host;
    }
}
